<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    
    <!-- Shadow Filter for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    
    <!-- Clip Path to keep waves and scale strictly inside the droplet -->
    <clipPath id="dropClip">
      <path d="M 256 110 C 256 110 360 230 360 310 C 360 368 313 415 256 415 C 199 415 152 368 152 310 C 152 230 256 110 256 110 Z" />
    </clipPath>
  </defs>

  <!-- Rounded Square Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Light Gloss Overlay (Top-Left) -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="#ffffff" fill-opacity="0.07"/>

  <!-- Droplet Contents (Clipped) -->
  <g clip-path="url(#dropClip)">
    <!-- Glassy Droplet Inner Fill -->
    <rect x="140" y="100" width="240" height="330" fill="#ffffff" fill-opacity="0.05" />
    
    <!-- Background Wave (softer, offset) -->
    <path d="M 100 290 Q 178 260 256 290 T 412 290 L 412 450 L 100 450 Z" fill="#ffffff" fill-opacity="0.25" />
    
    <!-- Foreground Wave (stronger) -->
    <path d="M 100 310 Q 178 335 256 310 T 412 310 L 412 450 L 100 450 Z" fill="#ffffff" fill-opacity="0.45" />

    <!-- Scale Gauge -->
    <g opacity="0.85">
      <!-- Vertical Rod -->
      <line x1="200" y1="140" x2="200" y2="380" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
      
      <!-- Long Ticks -->
      <line x1="200" y1="180" x2="225" y2="180" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
      <line x1="200" y1="220" x2="225" y2="220" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
      <line x1="200" y1="260" x2="225" y2="260" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
      <line x1="200" y1="300" x2="225" y2="300" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
      <line x1="200" y1="340" x2="225" y2="340" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
      <line x1="200" y1="380" x2="225" y2="380" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
      
      <!-- Short Ticks -->
      <line x1="200" y1="200" x2="213" y2="200" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
      <line x1="200" y1="240" x2="213" y2="240" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
      <line x1="200" y1="280" x2="213" y2="280" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
      <line x1="200" y1="320" x2="213" y2="320" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
      <line x1="200" y1="360" x2="213" y2="360" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
    </g>
  </g>

  <!-- Droplet Border Outline (with shadow) -->
  <path d="M 256 110 C 256 110 360 230 360 310 C 360 368 313 415 256 415 C 199 415 152 368 152 310 C 152 230 256 110 256 110 Z" 
        fill="none" stroke="#ffffff" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)" />

  <!-- Level Indicator Node (floating on the waves, with pulse rings & shadow) -->
  <g filter="url(#shadow)">
    <!-- Inner solid dot -->
    <circle cx="256" cy="300" r="14" fill="#ffffff" />
    <!-- Pulse ring 1 -->
    <circle cx="256" cy="300" r="28" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6" />
    <!-- Pulse ring 2 -->
    <circle cx="256" cy="300" r="42" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3" />
  </g>
</svg>
